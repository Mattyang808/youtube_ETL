name: CI-CD Pipeline for YouTube ETL

on: 
  push:
    branches: 
      - main
      - 'feature/*'
  pull_request:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs: 
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get changed files
        id: changed-files-build
        uses: tj-actions/changed-files@v45
        with:
          files: |
            Dockerfile
            requirements.txt

      - name: Set up Docker Buildx
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: |
          docker buildx build --push \
            --tag ${{vars.DOCKER_NAMESPACE}}/${{vars.DOCKERHUB_REPOSITORY}}:latest \
            --tag ${{vars.DOCKER_NAMESPACE}}/${{vars.DOCKERHUB_REPOSITORY}}:${{ github.sha }} .

  unit-and-integration-and-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    env:
      DOCKERHUB_NAMESPACE: ${{vars.DOCKER_NAMESPACE}}
      DOCKERHUB_REPOSITORY: ${{vars.DOCKERHUB_REPOSITORY}}
      POSTGRES_CONN_USERNAME: ${{vars.POSTGRES_CONN_USERNAME}}
      POSTGRES_CONN_PASSWORD: ${{secrets.POSTGRES_CONN_PASSWORD}}
      POSTGRES_CONN_HOST: ${{secrets.POSTGRES_CONN_HOST}}
      POSTGRES_CONN_PORT: ${{secrets.POSTGRES_CONN_PORT}}
      METADATA_DATABASE_NAME: ${{secrets.METADATA_DATABASE_NAME}}
      METADATA_DATABASE_USERNAME: ${{secrets.METADATA_DATABASE_USERNAME}}
      METADATA_DATABASE_PASSWORD: ${{secrets.METADATA_DATABASE_PASSWORD}}
      CELERY_BACKEND_NAME: ${{secrets.CELERY_BACKEND_NAME}}
      CELERY_BACKEND_USERNAME: ${{secrets.CELERY_BACKEND_USERNAME}}
      CELERY_BACKEND_PASSWORD: ${{secrets.CELERY_BACKEND_PASSWORD}}
      ETL_DATABASE_NAME: ${{secrets.ETL_DATABASE_NAME}}
      ETL_DATABASE_USERNAME: ${{secrets.ETL_DATABASE_USERNAME}}
      ETL_DATABASE_PASSWORD: ${{secrets.ETL_DATABASE_PASSWORD}}
      AIRFLOW_UID: ${{vars.AIRFLOW_UID}}
      _AIRFLOW_WWW_USER_USERNAME: ${{secrets._AIRFLOW_WWW_USER_USERNAME}}
      _AIRFLOW_WWW_USER_PASSWORD: ${{secrets._AIRFLOW_WWW_USER_PASSWORD}}
      FERNET_KEY: ${{secrets.FERNET_KEY}}
      AIRFLOW_VAR_API_KEY: ${{secrets.AIRFLOW_VAR_API_KEY}}
      AIRFLOW_VAR_CHANNEL_HANDLE: ${{vars.AIRFLOW_VAR_CHANNEL_HANDLE}}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get changed files
        id: changed-files-tests
        uses: tj-actions/changed-files@v45
        with:
          files: |
            dags/**
            include/**
            docker-compose.yaml

      - name: Set up docker compose
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: |
          docker compose up -d
      - name: Wait for services
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: sleep 30 # Simple wait or use a health check loop
      - name: Run unit and integration tests
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        # Use 'docker compose exec -T' (Target service name 'airflow-worker' from docker-compose.yaml)
        run: docker compose exec -T airflow-worker pytest tests/ -v
      - name: Run end-to-end tests
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: |
          DAG_NAMES=("produce_json" "update_db" "data_quality")
          for DAG in "${DAG_NAMES[@]}"; do
            docker compose exec -T airflow-worker airflow dags trigger "$DAG"
          done
      - name: Tear down docker compose
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: |
          docker compose down -v